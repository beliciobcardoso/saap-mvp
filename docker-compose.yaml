services:
  postgres:
    image: postgres:16-alpine
    container_name: saap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-saap_db}
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - saap-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d ${DB_NAME:-saap_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saap-network

  redis:
    image: redis:7-alpine
    container_name: saap-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - saap-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saap-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saap-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saap-network

networks:
  saap-network:
    driver: bridge

volumes:
  saap-postgres-data:
  saap-redis-data:
