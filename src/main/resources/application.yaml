server:
  port: "${PORT:8080}"

api:
  security:
    token:
      secret: "${JWT_SECRET}"
      expiration: "${JWT_EXPIRATION:86400000}"
    action-token:
      secret: "${ACTION_TOKEN_SECRET}"
      expiration: "${ACTION_TOKEN_EXPIRATION:86400000}"
    redis:
      enabled: "${REDIS_ENABLED:false}"

saap:
  app:
    base-url: "${APP_BASE_URL:http://localhost:8080}"
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}"
  scheduler:
    follow-up:
      cron: "${FOLLOW_UP_CRON:0 0 * * * *}"

clinic:
  settings:
    confirmation-window-hours: "${CLINIC_CONFIRMATION_WINDOW_HOURS:48}"
    follow-up-deadline-hours: "${CLINIC_FOLLOW_UP_DEADLINE_HOURS:24}"
    auto-cancel-after-no-response: "${CLINIC_AUTO_CANCEL:true}"

# Habilita o endpoint /actuator/logfile: informa ao Spring Boot onde o arquivo de log esta.
# O RollingFileAppender no logback-spring.xml (profile prod) usa o mesmo padrão.
logging:
  file:
    name: "${LOG_DIR:logs}/${LOG_FILE:saap-mvp}.log"

# Expoe os endpoints do Actuator via HTTP
# logfile: permite download do arquivo de log atual via GET /actuator/logfile
management:
  endpoints:
    web:
      exposure:
        include: health,info,logfile

spring:
  application:
    name: saap-mvp

  redis:
    host: "${REDIS_HOST:localhost}"
    port: "${REDIS_PORT:6379}"
    password: "${REDIS_PASSWORD:}"
    timeout: "${REDIS_TIMEOUT:2000}"

  datasource:
    url: "${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:saap_db}}"
    username: "${DATABASE_USERNAME:postgres}"
    password: "${DATABASE_PASSWORD:postgres}"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: "${SPRING_JPA_SHOW_SQL:false}"
    properties:
      "[hibernate.format_sql]": "${HIBERNATE_FORMAT_SQL:true}"

  flyway:
    enabled: "${FLYWAY_ENABLED:true}"
